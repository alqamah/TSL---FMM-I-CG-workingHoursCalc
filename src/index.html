<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working Hours Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <div class="logo-group">
                    <div class="logo-accent"></div>
                    <h1>Working Hours Calculator</h1>
                </div>
                <p>FMM-INFRA, Crane Group</p>
            </div>
            <div class="header-actions">
                <button id="exportBtn" class="btn btn-primary" disabled>
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round"
                        stroke-linejoin="round" height="16" width="16" xmlns="http://www.w3.org/2000/svg">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    <span>Export XLSX</span>
                </button>
            </div>
        </header>

        <main class="main-content">
            <section class="upload-section">
                <div class="upload-card">
                    <div class="upload-icon">
                        <!-- <svg stroke="currentColor" fill="none" stroke-width="1.5" viewBox="0 0 24 24"
                            stroke-linecap="round" stroke-linejoin="round" height="42" width="42"
                            xmlns="http://www.w3.org/2000/svg">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="12" y1="8" x2="12" y2="16"></line>
                            <line x1="8" y1="12" x2="16" y2="12"></line>
                        </svg> -->
                                                    <svg 
                            stroke="currentColor" 
                            fill="none" 
                            stroke-width="1.5" 
                            viewBox="0 0 24 24" 
                            stroke-linecap="round" 
                            stroke-linejoin="round" 
                            height="42" 
                            width="42" 
                            xmlns="http://www.w3.org/2000/svg"
                            >
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            
                            <text 
                                x="12" 
                                y="12.5" 
                                font-family="system-ui, -apple-system, sans-serif" 
                                font-size="6" 
                                font-weight="700" 
                                text-anchor="middle" 
                                dominant-baseline="middle" 
                                fill="currentColor" 
                                stroke="none"
                            >
                                CLM
                            </text>
                            </svg>
                    </div>
                    <h2>Upload CLM Files (XLS)</h2>
                    <label for="fileInput" class="btn btn-outline">Browse Files</label>
                    <input type="file" id="fileInput" accept=".xls,.xlsx" multiple hidden>
                </div>
            </section>

            <section class="status-section" id="statusSection" style="display: none;">
                <div class="status-card">
                    <div class="status-header">
                        <h3>File Processing</h3>
                        <span id="fileCountBadge" class="badge">0 files</span>
                    </div>
                    <ul id="fileStatusList" class="status-list">
                    </ul>
                </div>
            </section>

            <section class="data-section">
                <div class="data-controls">
                    <div class="search-box">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="search-icon">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text" id="searchInput" placeholder="Search by name, pass, vendor, or shift...">
                    </div>
                </div>

                <div class="table-container">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th>SL.NO.</th>
                                <th>DATE</th>
                                <th>PASS NO</th>
                                <th>EMPLOYEE NAME</th>
                                <!-- <th>VENDOR</th> -->
                                <th>SHIFT</th>
                                <th>IN</th>
                                <th>OUT</th>
                                <th>IN-TIME</th>
                                <th>OUT-TIME</th>
                                <!-- <th>DUTY-IN</th>
                                <th>DUTY-OUT</th> -->
                                <th>DUTY-HRS</th>
                                <th>OT-HRS</th>
                                <th class="highlight-header">TOTAL HRS</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr class="empty-state-row">
                                <td colspan="15">
                                    <div class="empty-state">
                                        <div class="empty-state-icon">
                                            <svg stroke="currentColor" fill="none" stroke-width="1.5"
                                                viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"
                                                height="42" width="42" xmlns="http://www.w3.org/2000/svg">
                                                <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                                                <polyline points="2 17 12 22 22 17"></polyline>
                                                <polyline points="2 12 12 17 22 12"></polyline>
                                            </svg>
                                        </div>
                                        <p>No data available</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="persistent_data.js"></script>
    <script src="script.js"></script>
</body>

</html>
